services:
  ai-pricing-service:
    build:
      context: .
      dockerfile: Dockerfile
    image: ai-pricing-service:1.0.0
    container_name: ai-pricing-service
    ports:
      - "8000:8000"
    environment:
      APP__ENV: production
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health/ready', timeout=3).read()",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  prometheus:
    image: prom/prometheus:v2.55.1
    container_name: ai-pricing-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    depends_on:
      ai-pricing-service:
        condition: service_healthy
